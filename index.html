<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Técnica</title>
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>
  <div class="bg-notes">
    <span class="note" style="left: 5%; animation-delay: 0s; font-size: 28px;">♩</span>
    <span class="note" style="left: 15%; animation-delay: 2s; font-size: 36px;">♪</span>
    <span class="note" style="left: 25%; animation-delay: 4s; font-size: 24px;">♫</span>
    <span class="note" style="left: 35%; animation-delay: 1s; font-size: 40px;">♬</span>
    <span class="note" style="left: 45%; animation-delay: 5s; font-size: 30px;">♪</span>
    <span class="note" style="left: 55%; animation-delay: 3s; font-size: 22px;">♩</span>
    <span class="note" style="left: 65%; animation-delay: 6s; font-size: 34px;">♫</span>
    <span class="note" style="left: 75%; animation-delay: 2.5s; font-size: 26px;">♪</span>
    <span class="note" style="left: 85%; animation-delay: 4.5s; font-size: 38px;">♬</span>
    <span class="note" style="left: 92%; animation-delay: 3.5s; font-size: 20px;">♩</span>
  </div>
  <div class="container">
    <div class="form">
      <input type="url" id="linkInput" placeholder="Paste your link here..." required>
      <button id="submitBtn">Submit</button>
    </div>
  </div>
</body>
</html>
